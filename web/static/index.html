<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fundamental Research Engine</title>
<style>
  :root { --bg:#0f1216; --panel:#171c23; --line:#2a323d; --fg:#e6eaf0; --muted:#93a0b0; --accent:#4f9cf0; --good:#3fb27f; --warn:#e0a53a; --bad:#e06666; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--fg); }
  a { color:var(--accent); }
  button { font:inherit; cursor:pointer; border:1px solid var(--line); background:var(--panel); color:var(--fg); border-radius:6px; padding:6px 12px; }
  button.primary { background:var(--accent); border-color:var(--accent); color:#06121f; font-weight:600; }
  button:disabled { opacity:.5; cursor:default; }
  textarea, input { font:inherit; width:100%; background:#0c0f13; color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:8px; }
  .hidden { display:none !important; }
  header { display:flex; align-items:center; gap:12px; padding:10px 16px; border-bottom:1px solid var(--line); }
  header h1 { font-size:15px; margin:0; }
  header .sp { flex:1; }
  header .muted { color:var(--muted); font-size:12px; }
  #layout { display:flex; height:calc(100vh - 49px); }
  #side { width:290px; border-right:1px solid var(--line); padding:12px; overflow:auto; }
  #main { flex:1; overflow:auto; padding:18px 24px; scroll-behavior:smooth; }
  .sess { padding:8px 10px; border:1px solid var(--line); border-radius:6px; margin-bottom:8px; cursor:pointer; }
  .sess:hover { border-color:var(--accent); }
  .sess .brief { font-size:13px; }
  .sess .meta { color:var(--muted); font-size:11px; margin-top:4px; }
  .badge { display:inline-block; font-size:11px; padding:1px 7px; border-radius:10px; border:1px solid var(--line); }
  .badge.done{color:var(--good);border-color:var(--good);} .badge.error{color:var(--bad);border-color:var(--bad);}
  .badge.running,.badge.pending{color:var(--warn);border-color:var(--warn);}
  .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px 16px; margin-bottom:14px; }
  .card h3 { margin:0 0 8px; font-size:14px; }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:top; }
  th { color:var(--muted); font-weight:500; }
  .rate-critical{color:var(--bad);font-weight:600;} .rate-strong{color:var(--warn);font-weight:600;}
  .rate-watch{color:var(--accent);} .rate-weak{color:var(--muted);}
  pre { white-space:pre-wrap; word-wrap:break-word; background:#0c0f13; border:1px solid var(--line); border-radius:6px; padding:12px; max-height:520px; overflow:auto; font-size:12.5px; }
  .prog { font-family:ui-monospace,monospace; font-size:12.5px; }
  .prog .row { padding:2px 0; }
  .tag { color:var(--muted); }
  .mono { font-family:ui-monospace,Consolas,monospace; }
  .stagebar { display:flex; gap:6px; flex-wrap:wrap; margin:8px 0; }
  .chip { font-size:11px; padding:2px 8px; border-radius:10px; border:1px solid var(--line); color:var(--muted); }
  .center { max-width:420px; margin:12vh auto; }
  .err { color:var(--bad); }
  .ok { color:var(--good); }
  small.muted { color:var(--muted); }
  ul.tight { margin:6px 0; padding-left:18px; }
  /* ---- result-page reading experience ---- */
  .nav { position:sticky; top:-18px; z-index:5; background:var(--bg); padding:10px 0 8px; display:flex; gap:8px; flex-wrap:wrap; }
  .nav a { font-size:12px; padding:3px 11px; border:1px solid var(--line); border-radius:12px; color:var(--muted); text-decoration:none; }
  .nav a:hover { color:var(--accent); border-color:var(--accent); }
  h2.sec { font-size:15px; margin:24px 0 10px; padding-left:9px; border-left:3px solid var(--accent); scroll-margin-top:46px; }
  h2.sec small { color:var(--muted); font-weight:400; font-size:12px; margin-left:8px; }
  .summary { border-color:var(--accent); }
  .kv { display:flex; gap:6px; flex-wrap:wrap; margin:8px 0 2px; }
  .tipd { border-bottom:1px dotted var(--muted); cursor:help; }
  .bar { display:inline-block; width:96px; height:8px; background:#0c0f13; border:1px solid var(--line); border-radius:4px; vertical-align:middle; overflow:hidden; }
  .bar .fill { display:block; height:100%; background:var(--accent); }
  .fill.good{background:var(--good);} .fill.warn{background:var(--warn);} .fill.bad{background:var(--bad);} .fill.muted{background:var(--muted);}
  .dimrow { display:flex; align-items:center; gap:8px; font-size:12.5px; padding:2px 0; }
  .dimrow .dn { flex:0 0 200px; color:var(--muted); }
  sup.evref a { color:var(--muted); font-size:10px; margin-left:2px; text-decoration:none; }
  sup.evref a:hover { color:var(--accent); }
  .cocard { background:#0c0f13; border:1px solid var(--line); border-radius:6px; padding:10px 12px; margin:8px 0; }
  .cocard b.nm { font-size:14px; }
  .scn { border-left:3px solid var(--line); padding:6px 12px; margin:10px 0; }
  .scn.bull{border-color:var(--good);} .scn.bear{border-color:var(--bad);} .scn.base{border-color:var(--accent);}
  details.ops summary { cursor:pointer; color:var(--muted); font-size:13px; }
  tr[id] { scroll-margin-top:52px; }
  .md h2 { font-size:16px; border-bottom:1px solid var(--line); padding-bottom:4px; margin:18px 0 8px; }
  .md h3 { font-size:14px; margin:14px 0 6px; }
  .md h4 { font-size:13px; margin:12px 0 4px; }
  .md p { margin:6px 0; }
  .md table { margin:8px 0; }
  .md code { background:#0c0f13; border:1px solid var(--line); border-radius:4px; padding:0 4px; font-size:12px; }
  .md .tblwrap { overflow-x:auto; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="center hidden">
  <div class="card">
    <h3>登录</h3>
    <p class="muted">输入共享口令以访问基本面研究引擎。</p>
    <input id="pw" type="password" placeholder="共享口令" />
    <p id="loginerr" class="err"></p>
    <button class="primary" onclick="doLogin()">进入</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header>
    <h1>Fundamental Research Engine</h1>
    <span id="modelinfo" class="muted"></span>
    <span class="sp"></span>
    <button onclick="doLogout()">退出</button>
  </header>
  <div id="layout">
    <div id="side">
      <button class="primary" style="width:100%" onclick="showPrimer()">+ 题材入门 / Primer</button>
      <button style="width:100%;margin-top:8px" onclick="showNew()">+ 直接新建分析</button>
      <button style="width:100%;margin-top:8px" onclick="showAudit()">维测日志</button>
      <div id="sessions" style="margin-top:12px"></div>
    </div>
    <div id="main"></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
async function api(path, opts={}) {
  const r = await fetch(path, {credentials:"same-origin", headers:{"Content-Type":"application/json"}, ...opts});
  if (r.status === 401) { showLogin(); throw new Error("unauth"); }
  if (!r.ok) { let d; try{d=await r.json();}catch(e){} throw new Error((d&&d.detail)||("HTTP "+r.status)); }
  return r.status===204 ? null : r.json();
}
async function clientLog(level, message, context={}) {
  try {
    await fetch("/api/client-log", {
      method: "POST",
      credentials: "same-origin",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({level, message: String(message || "").slice(0, 1000), context})
    });
  } catch(e) {}
}
window.addEventListener("error", ev => {
  clientLog("error", ev.message || "window error", {
    source: ev.filename || location.href,
    line: ev.lineno,
    column: ev.colno,
    stack: ev.error && ev.error.stack
  });
});
window.addEventListener("unhandledrejection", ev => {
  const reason = ev.reason || {};
  clientLog("unhandledrejection", reason.message || String(reason), {stack: reason.stack});
});
function esc(s){ return (s==null?"":String(s)).replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

// ---- 枚举中文化：label = 显示文本，tip = 悬停解释 ----
const fmt = {
  hype: {
    trigger: "技术触发期",
    inflated_expectations: "预期膨胀期",
    disillusionment: "预期回落期",
    enlightenment: "产业验证期",
    productivity: "规模兑现期"
  },
  themeType: {
    technology_adoption: "技术渗透",
    supply_demand_cycle: "供需周期",
    policy_driven: "政策驱动",
    consumer_adoption: "消费渗透",
    healthcare_clinical: "医药临床",
    macro_cycle: "宏观周期",
    geopolitics_security: "地缘安全"
  },
  status: { pending:"待启动", running:"运行中", done:"完成", error:"异常" },
  stage: {
    theme_definition:"主题定义", mechanism_analysis:"机制分析", bottleneck_diagnosis:"瓶颈诊断",
    value_chain_map:"价值链映射", company_positioning:"公司卡位", scenario_analysis:"情景分析"
  },
  rating: {
    critical:{label:"关键", cls:"bad",   tip:"卡脖子级瓶颈（≥4.1 分）：短期无替代方案，掌控方定价权最强"},
    strong:  {label:"强",   cls:"warn",  tip:"强瓶颈（≥3.2 分）：明确的供给约束，值得重点跟踪"},
    watch:   {label:"观察", cls:"accent",tip:"观察级（≥2.2 分）：存在约束但强度一般，需跟踪演变方向"},
    weak:    {label:"弱",   cls:"muted", tip:"弱瓶颈（<2.2 分）：约束较弱，供给方议价能力有限"}
  },
  positioning: {
    "core bottleneck owner":{label:"核心瓶颈掌控者", tip:"掌握产业最紧缺环节，定价权与业绩弹性最强"},
    "qualified leader":     {label:"认证领先者",     tip:"已通过客户认证、份额领先，替换成本高"},
    "capacity enabler":     {label:"产能赋能者",     tip:"提供全行业扩产所需的设备/材料/产能"},
    "capex beneficiary":    {label:"资本开支受益者", tip:"受益于产业投资周期，但弹性随资本开支波动"},
    "architecture option":  {label:"架构期权",       tip:"押注新技术路线：路线成则大赢，不成则价值归零"},
    "risk hedge":           {label:"风险对冲",       tip:"无论技术路线之争谁赢，都能受益或对冲损失"},
    "theme-only":           {label:"纯题材",         tip:"与主题只有概念关联，缺乏实质业务敞口"}
  },
  beneficiary: {
    "first-order":"一阶受益", "second-order":"二阶受益", enabler:"赋能环节",
    substitute:"替代路线", "risk hedge":"风险对冲", "theme-only":"纯题材"
  },
  quality: { low:"低", medium:"中", "medium-high":"中高", high:"高", "option value":"期权价值" },
  level: { high:"高", medium:"中", low:"低" },
  direction: { positive:"正向 ↑", negative:"负向 ↓" },
  sourceType: {
    company_disclosure:"公司披露", regulatory_filing:"监管公告", market_data:"市场数据",
    news:"新闻", industry_report:"行业报告", expert_interview:"专家访谈", academic:"学术文献"
  },
  scenario: {
    bull:{label:"乐观情景", cls:"bull"}, base:{label:"基准情景", cls:"base"}, bear:{label:"悲观情景", cls:"bear"}
  },
  dimension: {
    demand_growth_speed:"需求增长速度",
    capacity_expansion_difficulty:"扩产难度",
    technology_substitution_difficulty:"技术替代难度",
    yield_material_equipment_constraint:"良率/材料/设备约束",
    customer_qualification_lock_in:"客户认证锁定",
    supplier_pricing_power:"供应商定价权",
    rapid_supply_release_risk:"供给快速释放风险（减分项）",
    architecture_bypass_risk:"架构绕过风险（减分项）"
  },
  tier: {
    draft:"草稿", "evidence-backed":"有证据支撑", "quote-verified":"引文已核验",
    "multi-source causal map":"多源因果图", "review-ready":"可评审"
  }
};
const NEG_DIMS = ["rapid_supply_release_risk", "architecture_bypass_risk"];
function cnHype(v){ return fmt.hype[v] || v || ""; }
function cnThemeType(v){ return fmt.themeType[v] || v || ""; }
function cnStatus(v){ return fmt.status[v] || v || ""; }
function cnStage(v){ return fmt.stage[v] || v || ""; }
function cnQuality(v){ return fmt.quality[v] || v || ""; }
function cnLevel(v){ return fmt.level[v] || v || ""; }
function cnEvent(v){
  return ({
    http_request:"HTTP 请求", login_succeeded:"登录成功", login_failed:"登录失败", logout:"退出登录",
    primer_created:"创建题材入门", primer_started:"题材梳理开始", primer_finished:"题材梳理完成", primer_failed:"题材梳理失败",
    analysis_created:"创建深度分析", analysis_started:"分析开始", analysis_finished:"分析完成",
    stage_draft_started:"阶段起草开始", stage_draft_finished:"阶段起草完成", stage_draft_failed:"阶段起草失败",
    analysis_validation_failed:"结构校验失败", analysis_pipeline_failed:"流水线失败",
    framing_promoted:"立题转深度分析", critique_started:"审阅开始", critique_finished:"审阅完成", critique_failed:"审阅失败",
    refine_started:"优化开始", refine_finished:"优化完成", refine_failed:"优化失败"
  })[v] || v || "";
}
function ratingBadge(r){
  const m = fmt.rating[r];
  if(!m) return esc(r||"");
  return `<span class="rate-${esc(r)} tipd" title="${esc(m.tip)}">${m.label}<small class="muted">（${esc(r)}）</small></span>`;
}
function posLabel(v){
  const m = fmt.positioning[v];
  return m ? `<span class="tipd" title="${esc(m.tip)}">${m.label}</span>` : esc(v||"");
}
function bar(v, max, cls){
  const pct = Math.max(0, Math.min(100, (Number(v)||0)/max*100));
  return `<span class="bar"><span class="fill ${cls||""}" style="width:${pct}%"></span></span>`;
}
// 证据角标：E1 → 跳到证据附录；E1.C1 之类的 claim id 跳到其所属证据行
function evSup(ids){
  if(!ids || !ids.length) return "";
  return '<sup class="evref">' + ids.map(x =>
    `<a href="#ev-${esc(String(x).split(".")[0])}" title="跳到证据附录 ${esc(x)}">[${esc(x)}]</a>`).join("") + '</sup>';
}

// ---- 轻量 markdown 渲染（标题/加粗/代码/链接/列表/表格），用于 memo 正文 ----
function mdInline(s){
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
  s = s.replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
  s = s.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}
function mdToHtml(md){
  const lines = String(md||"").split(/\r?\n/);
  let html = "", i = 0, inList = false;
  const closeList = () => { if(inList){ html += "</ul>"; inList = false; } };
  while(i < lines.length){
    const L = lines[i];
    if(/^\s*$/.test(L)){ closeList(); i++; continue; }
    const h = L.match(/^(#{1,4})\s+(.*)/);
    if(h){ closeList(); const lv = Math.min(h[1].length, 3) + 1; html += `<h${lv}>${mdInline(h[2])}</h${lv}>`; i++; continue; }
    if(/^\|/.test(L) && i+1 < lines.length && /^\|[\s:|-]+\|?\s*$/.test(lines[i+1])){
      closeList();
      const cells = r => r.replace(/^\||\|\s*$/g,"").split("|").map(c=>c.trim());
      const headers = cells(L);
      i += 2;
      let rows = [];
      while(i < lines.length && /^\|/.test(lines[i])){ rows.push(cells(lines[i])); i++; }
      html += '<div class="tblwrap"><table><tr>' + headers.map(c=>`<th>${mdInline(c)}</th>`).join("") + "</tr>"
        + rows.map(r=>"<tr>"+r.map(c=>`<td>${mdInline(c)}</td>`).join("")+"</tr>").join("") + "</table></div>";
      continue;
    }
    if(/^[-*]\s+/.test(L)){
      if(!inList){ html += '<ul class="tight">'; inList = true; }
      html += `<li>${mdInline(L.replace(/^[-*]\s+/,""))}</li>`; i++; continue;
    }
    closeList(); html += `<p>${mdInline(L)}</p>`; i++;
  }
  closeList();
  return html;
}

// ---- auth ----
async function boot(){
  const me = await (await fetch("/api/me",{credentials:"same-origin"})).json();
  if (me.authenticated) showApp(); else showLogin();
}
function showLogin(){ $("#login").classList.remove("hidden"); $("#app").classList.add("hidden"); }
async function showApp(){
  $("#login").classList.add("hidden"); $("#app").classList.remove("hidden");
  try {
    const c = await api("/api/config");
    const modelLabel = c.model_name ? `${c.model}:${c.model_name}` : c.model;
    $("#modelinfo").textContent = modelLabel + (c.config_error?"（配置异常）":(c.requires_api_key&&!c.has_key?"（未配置 API Key）":""));
    $("#modelinfo").title = c.config_error || "";
  } catch(e){}
  refreshSessions(); showPrimer();
}
async function doLogin(){
  $("#loginerr").textContent="";
  try { await api("/api/login",{method:"POST",body:JSON.stringify({password:$("#pw").value})}); showApp(); }
  catch(e){ $("#loginerr").textContent = "口令错误"; }
}
async function doLogout(){ await api("/api/logout",{method:"POST"}); location.reload(); }

// ---- sessions ----
async function refreshSessions(){
  const items = await api("/api/analyses");
  $("#sessions").innerHTML = items.map(s => `
    <div class="sess" onclick="openSession('${s.id}')">
      <div class="brief">${esc((s.brief||"").slice(0,90))}</div>
      <div class="meta"><span class="badge ${s.status}">${cnStatus(s.status)}</span> · ${s.runs} 次运行 · ${esc((s.created_at||"").slice(0,16).replace("T"," "))}</div>
    </div>`).join("") || '<p class="muted">还没有分析。</p>';
}

async function showAudit(){
  $("#main").innerHTML = `<div class="card"><h3>维测日志</h3><p class="muted">正在读取最近事件...</p></div>`;
  try {
    const rows = await api("/api/audit/events?limit=200");
    $("#main").innerHTML = `<div class="card"><h3>维测日志</h3>
      <p class="muted">来源：<span class="mono">web_data/audit/events.jsonl</span>。日志不记录 API Key、prompt 或模型原文，仅记录状态、耗时和摘要元数据。</p>
      <table><tr><th>时间</th><th>事件</th><th>对象</th><th>状态/耗时</th></tr>
      ${rows.slice().reverse().map(r=>`<tr>
        <td class="mono">${esc((r.ts||"").slice(0,19).replace("T"," "))}</td>
        <td>${esc(cnEvent(r.event))}<br><small class="muted mono">${esc(r.event)}</small></td>
        <td>${esc(r.session_id||r.path||r.topic||"")}${r.stage?`<br><small class="muted">${esc(r.stage)}</small>`:""}</td>
        <td>${r.status_code?`HTTP ${esc(r.status_code)} · `:""}${r.duration_ms!=null?`${esc(r.duration_ms)} ms`:""}${r.error?`<br><small class="err">${esc(r.error)}</small>`:""}</td>
      </tr>`).join("")}</table></div>`;
  } catch(e) {
    $("#main").innerHTML = `<div class="card"><h3>维测日志</h3><p class="err">${esc(e.message)}</p></div>`;
  }
}

// ---- new analysis ----
function showNew(){
  $("#main").innerHTML = `
    <div class="card">
      <h3>新建基本面分析</h3>
      <p class="muted">描述你要研究的主题/行业/趋势，引擎会分 6 个阶段构建结构化分析并生成研究备忘录。</p>
      <textarea id="brief" rows="5" placeholder="例如：HBM4 在 2026-2027 是否仍是 AI 基础设施的核心瓶颈？关注供给、认证锁定与先进封装。"></textarea>
      <p><button class="primary" onclick="startNew()">开始分析</button></p>
    </div>`;
}
async function startNew(){
  const brief = $("#brief").value.trim();
  if(!brief) return;
  const {id} = await api("/api/analyses",{method:"POST",body:JSON.stringify({brief})});
  await refreshSessions();
  runStream(id, brief);
}

const STAGES = ["theme_definition","mechanism_analysis","bottleneck_diagnosis","value_chain_map","company_positioning","scenario_analysis"];
function runStream(id, brief){
  $("#main").innerHTML = `
    <div class="card">
      <h3>正在分析</h3>
      <p class="muted">${esc(brief)}</p>
      <div class="stagebar" id="chips">${STAGES.map(s=>`<span class="chip" id="c-${s}" title="${esc(s)}">${cnStage(s)}</span>`).join("")}</div>
      <div class="prog" id="prog"></div>
    </div>`;
  const log = (html,cls="") => { const d=document.createElement("div"); d.className="row "+cls; d.innerHTML=html; $("#prog").appendChild(d); };
  const es = new EventSource(`/api/analyses/${id}/stream`);
  es.onmessage = ev => {
    const e = JSON.parse(ev.data);
    if(e.event==="queued"){ log('<span class="tag">已连接，等待空闲槽位/准备中 …</span>');
    } else if(e.event==="stage"){
      const chip=$("#c-"+e.stage);
      if(e.status==="drafting"){ log(`<span class="tag">[${e.index}/${e.total}]</span> 起草 ${cnStage(e.stage)} …`); if(chip)chip.style.borderColor="var(--warn)"; }
      if(e.status==="done"||e.status==="kept"){ if(chip){chip.style.color="var(--good)";chip.style.borderColor="var(--good)";} }
    } else if(e.event==="validating"){ log("校验主题结构 …");
    } else if(e.event==="running"){ log("运行流水线、生成备忘录 …");
    } else if(e.event==="done"){ log("完成 ✓","ok"); es.close(); refreshSessions(); openSession(id);
    } else if(e.event==="error"){ log("错误：" + esc(e.message),"err"); es.close(); refreshSessions();
    } else if(e.event==="info"){ log(esc(e.message)); }
  };
  es.onerror = () => { log("连接中断（可刷新会话查看结果）","err"); es.close(); };
}

async function doCritique(id, stage){
  const box = $("#crit-"+stage); box.innerHTML = '<small class="muted">审阅中…</small>';
  try {
    const c = await api(`/api/analyses/${id}/critique`,{method:"POST",body:JSON.stringify({stage})});
    const concerns = c.concerns||[];
    box.innerHTML = `<div style="margin-top:6px"><small class="ok">建议：${esc(c.recommendation||"")}</small>
      <ul class="tight">${concerns.map(x=>`<li><b>${esc(x.severity)}</b> ${esc(x.field)}：${esc(x.issue)} <small class="muted">→ ${esc(x.suggested_fix)}</small></li>`).join("")||"<li>无重大问题</li>"}</ul></div>`;
  } catch(e){ box.innerHTML = `<small class="err">${esc(e.message)}</small>`; }
}
async function doRefine(id, stage){
  const instruction = prompt("对该阶段的优化说明（例如：补充良率约束的量化证据）：","");
  if(instruction===null) return;
  const box = $("#crit-"+stage); box.innerHTML = '<small class="muted">重新起草并重跑…</small>';
  try {
    const r = await api(`/api/analyses/${id}/refine`,{method:"POST",body:JSON.stringify({stage,instruction})});
    box.innerHTML = `<small class="ok">已生成 ${esc(r.run.run_id)}${r.diff?"（含 diff）":""}</small>`;
    openSession(id);
  } catch(e){ box.innerHTML = `<small class="err">${esc(e.message)}</small>`; }
}

// ---- primer: fuzzy topic -> orientation + candidate framings ----
function showPrimer(){
  $("#main").innerHTML = `
    <div class="card">
      <h3>题材入门 / Primer</h3>
      <p class="muted">还不确定要分析什么？输入一个题材/技术/名词，引擎会联网抓取一手源，快速梳理：大白话解释、术语表、价值链版图、当前态势与成熟度、核心争论，并给出 2-4 个可直接进入深度分析的立题。</p>
      <input id="topic" placeholder="例如：HBM、固态电池、GLP-1 减肥药、电网储能" onkeydown="if(event.key==='Enter')startPrimer()" />
      <p><button class="primary" onclick="startPrimer()">开始梳理</button></p>
      <small class="muted">Primer 是一张"待验证的地图"：每条事实性陈述都会标注是否需核实，并附上可查证的来源。</small>
    </div>`;
}
async function startPrimer(){
  const topic = $("#topic").value.trim();
  if(!topic) return;
  const {id} = await api("/api/primers",{method:"POST",body:JSON.stringify({topic})});
  runPrimerStream(id, topic);
}
function runPrimerStream(id, topic){
  $("#main").innerHTML = `<div class="card"><h3>正在梳理：${esc(topic)}</h3><div class="prog" id="pprog"></div></div>`;
  const log=(html,cls="")=>{const d=document.createElement("div");d.className="row "+cls;d.innerHTML=html;$("#pprog").appendChild(d);};
  const es=new EventSource(`/api/primers/${id}/stream`);
  es.onmessage=ev=>{
    const e=JSON.parse(ev.data);
    if(e.event==="queued") log('<span class="tag">已连接，准备中 …</span>');
    else if(e.event==="working") log(esc(e.message)+" …");
    else if(e.event==="done"){ log("完成 ✓","ok"); es.close(); renderPrimer(id, e.primer); }
    else if(e.event==="error"){ log("错误："+esc(e.message),"err"); es.close(); }
    else if(e.event==="info") log(esc(e.message));
  };
  es.onerror=()=>{ log("连接中断（可重试）","err"); es.close(); };
}
function renderPrimer(id, res){
  const p = res.primer||{};
  const g = p.glossary||[], ls = p.landscape||[], deb = p.key_debates||[], kc = p.key_claims||[];

  let html = `<div class="card"><h3>${esc(res.resolved_title||res.topic)} <small class="muted">题材入门</small></h3>
    <p>${esc(p.explainer||"")}</p>
    <p><small class="muted">${res.seed_used?"已抓取 Wikipedia 种子源":"未找到 Wikipedia 种子源"} · 产业阶段：${esc(cnHype((p.maturity||{}).hype_stage))} · 技术成熟度 TRL ${esc((p.maturity||{}).technology_readiness_level)}</small></p>
    ${p.state_of_play?`<p><b>当前态势：</b>${esc(p.state_of_play)}</p>`:""}</div>`;

  if(g.length) html += `<div class="card"><h3>术语表</h3><table><tr><th>术语</th><th>含义</th></tr>
    ${g.map(x=>`<tr><td>${esc(x.term)}</td><td>${esc(x.definition)}</td></tr>`).join("")}</table></div>`;

  if(ls.length) html += `<div class="card"><h3>价值链 / 版图</h3><table><tr><th>环节</th><th>角色</th><th>代表玩家</th></tr>
    ${ls.map(x=>`<tr><td>${esc(x.segment)}</td><td>${esc(x.role)}</td><td>${esc((x.example_players||[]).join("、"))}</td></tr>`).join("")}</table></div>`;

  if(deb.length) html += `<div class="card"><h3>核心争论</h3>${deb.map(d=>`
    <div style="margin:6px 0"><b>${esc(d.question)}</b>
      <div><small class="ok">多头：</small>${esc(d.bull)}</div>
      <div><small class="err">空头：</small>${esc(d.bear)}</div></div>`).join("")}</div>`;

  html += `<div class="card"><h3>选择一个立题进入深度分析</h3>
    <p class="muted">每个立题会作为 theme_definition 直接种入分析流水线，自动补全其余阶段并生成备忘录。</p>
    ${fr.map(f=>`<div class="card" style="background:#0c0f13">
      <b>${esc(f.title)}</b>
      <p><b>核心问题：</b>${esc(f.core_question)}</p>
      <p><b>初始假设：</b>${esc(f.thesis_hypothesis)}</p>
      <p><small class="muted">类型 ${esc(cnThemeType(f.theme_type))} · 领域 ${esc(f.domain)}</small></p>
      ${(f.drivers||[]).length?`<b>驱动：</b><ul class="tight">${f.drivers.map(d=>`<li>${esc(d)}</li>`).join("")}</ul>`:""}
      <button class="primary" onclick="promoteFraming('${id}','${esc(f.id)}')">进入深度分析 →</button>
    </div>`).join("")}</div>`;

  if(kc.length) html += `<div class="card"><h3>关键陈述（含核实标记）</h3><table><tr><th>陈述</th><th>状态</th></tr>
    ${kc.map(c=>`<tr><td>${esc(c.claim)}</td><td>${(c.verify||!(c.supported_by||[]).length)?'<span class="badge error">需核实</span>':'<span class="badge done">有来源</span>'}</td></tr>`).join("")}</table></div>`;

  if(src.length) html += `<div class="card"><h3>已抓取来源</h3><table><tr><th>来源</th><th>状态</th></tr>
    ${src.map(s=>`<tr><td>${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.title)}</a>`:esc(s.title)}</td><td>${esc(s.fetch_status)}</td></tr>`).join("")}</table></div>`;

  if(uv.length) html += `<div class="card"><small class="muted">⚠️ ${uv.length} 条陈述仍需核实 —— Primer 是起点地图，不是结论。进入深度分析后由证据/接地层继续验证。</small></div>`;

  $("#main").innerHTML = html;
}
async function promoteFraming(primerId, framingId){
  const {analysis_id} = await api(`/api/primers/${primerId}/promote`,{method:"POST",body:JSON.stringify({framing_id:framingId})});
  await refreshSessions();
  const data = await api("/api/analyses/"+analysis_id);
  runStream(analysis_id, data.meta.brief);
}

boot();
</script>
</body>
</html>
