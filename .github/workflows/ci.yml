name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Validate monolithic sample themes
        run: |
          for theme in configs/themes/*.json; do
            PYTHONPATH=src python -m fundamental_research_engine validate "$theme"
          done

      - name: Validate staged sample themes
        run: |
          for theme_dir in configs/themes_staged/*/; do
            PYTHONPATH=src python -m fundamental_research_engine validate "${theme_dir%/}"
          done

      - name: Run all monolithic sample themes
        run: |
          for theme in configs/themes/*.json; do
            PYTHONPATH=src python -m fundamental_research_engine run "$theme" --out "/tmp/ci-runs/$(basename "$theme" .json)"
          done
